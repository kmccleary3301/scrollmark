name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build all userscript variants
        run: npm run build:all

      - name: Validate userscript metadata
        run: npm run check:metadata

      - name: Upload userscript artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scrollmark-userscripts
          path: |
            dist/scrollmark.user.js
            dist/scrollmark.store.user.js
            dist/twitter-web-exporter-e2e.user.js
            dist/twitter-web-exporter-chrome-e2e.user.js
          if-no-files-found: error
